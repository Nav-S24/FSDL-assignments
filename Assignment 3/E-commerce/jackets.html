<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jackets</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="jackets.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="index.html">FASHION HUB</a>
        <div>
            <a href="cart.html" class="nav-btn">CART</a>
            <a href="login.html" class="nav-btn">LOGIN</a>
        </div>
    </div>
</nav>

<!-- Page Title -->
<div class="container text-center mt-5">
    <h2 class="page-title">JACKETS</h2>
</div>

<!-- Products -->
<div class="container mt-4">
    <div class="row g-5">

        <!-- Jacket 1 -->
        <div class="col-md-4">
            <div class="card text-center">
                <img src="jk/1.webp" class="card-img-top" alt="Leather Jacket">
                <div class="card-body">
                    <h5 class="card-title">Leather Jacket</h5>
                    <p class="price">Rs. 4500</p>

                    <select class="form-select size-select mb-3">
                        <option value="">Select Size</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>

                    <button class="lux-btn"
                        onclick="addToCart(this,'Jacket : Leather',4500)">
                        ADD TO CART
                    </button>
                </div>
            </div>
        </div>

        <!-- Jacket 2 -->
        <div class="col-md-4">
            <div class="card text-center">
                <img src="jk/2.avif" class="card-img-top" alt="Denim Jacket">
                <div class="card-body">
                    <h5 class="card-title">Denim Jacket</h5>
                    <p class="price">Rs. 3500</p>

                    <select class="form-select size-select mb-3">
                        <option value="">Select Size</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>

                    <button class="lux-btn"
                        onclick="addToCart(this,'Jacket : Denim',3500)">
                        ADD TO CART
                    </button>
                </div>
            </div>
        </div>

        <!-- Jacket 3 -->
        <div class="col-md-4">
            <div class="card text-center">
                <img src="jk/3.webp" class="card-img-top" alt="Bomber Jacket">
                <div class="card-body">
                    <h5 class="card-title">Bomber Jacket</h5>
                    <p class="price">Rs. 4000</p>

                    <select class="form-select size-select mb-3">
                        <option value="">Select Size</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>

                    <button class="lux-btn"
                        onclick="addToCart(this,'Jacket : Bomber',4000)">
                        ADD TO CART
                    </button>
                </div>
            </div>
        </div>

        <!-- Jacket 4 -->
        <div class="col-md-4">
            <div class="card text-center">
                <img src="jk/4.jpg" class="card-img-top" alt="Winter Jacket">
                <div class="card-body">
                    <h5 class="card-title">Winter Jacket</h5>
                    <p class="price">Rs. 5000</p>

                    <select class="form-select size-select mb-3">
                        <option value="">Select Size</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>

                    <button class="lux-btn"
                        onclick="addToCart(this,'Jacket : Winter',5000)">
                        ADD TO CART
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function addToCart(button, productName, productPrice) {

        let cardBody = button.parentElement;
        let sizeSelect = cardBody.querySelector(".size-select");
        let selectedSize = sizeSelect.value;

        if (selectedSize === "") {
            alert("Please select a size before adding to cart.");
            return;
        }

        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        cart.push({
            name: productName,
            price: productPrice,
            size: selectedSize,
            quantity: 1
        });

        localStorage.setItem('cart', JSON.stringify(cart));

        alert(productName + " (Size: " + selectedSize + ") added to cart.");
    }
</script>

</body>
</html>
