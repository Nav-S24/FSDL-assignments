<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="cart.css">
</head>

<body>

<!-- Luxury Navbar -->
<nav class="navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="index.html">FASHION HUB</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="page-title">MY CART</h2>

    <div id="cartContainer" class="cart-container mt-4"></div>

    <div class="cart-summary mt-4">
        <h4>Total: Rs. <span id="total">0</span></h4>
        <button class="clear-btn mt-3" onclick="clearCart()">CLEAR CART</button>
    </div>

</div>

<script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let cartContainer = document.getElementById("cartContainer");

    function renderCart() {
        cartContainer.innerHTML = "";
        let total = 0;

        if (cart.length === 0) {
            cartContainer.innerHTML = "<p class='empty-text'>Your cart is empty.</p>";
            document.getElementById("total").innerText = 0;
            return;
        }

        cart.forEach((item, index) => {

            let itemDiv = document.createElement("div");
            itemDiv.className = "cart-item";

            itemDiv.innerHTML = `
                <div class="cart-info">
                    <h5>${item.name}</h5>
                    <p>Size: <strong>${item.size || "-"}</strong></p>
                    <p>Rs. ${item.price} × ${item.quantity}</p>
                </div>

                <div class="cart-actions">
                    <button onclick="changeQty(${index}, -1)">−</button>
                    <button onclick="changeQty(${index}, 1)">+</button>
                    <button class="remove-btn" onclick="removeItem(${index})">✕</button>
                </div>
            `;

            cartContainer.appendChild(itemDiv);
            total += item.price * item.quantity;
        });

        document.getElementById("total").innerText = total;
        localStorage.setItem("cart", JSON.stringify(cart));
    }

    function changeQty(index, change) {
        cart[index].quantity += change;

        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }

        renderCart();
    }

    function removeItem(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function clearCart() {
        cart = [];
        localStorage.removeItem("cart");
        renderCart();
    }

    renderCart();
</script>

</body>
</html>
