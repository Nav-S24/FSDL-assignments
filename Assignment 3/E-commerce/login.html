<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="login.css">
</head>

<body>

<!-- Luxury Navbar -->
<nav class="navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="index.html">FASHION HUB</a>
    </div>
</nav>

<div class="login-wrapper">
    <div class="login-card">

        <h2 class="login-title">LOGIN</h2>

        <form action="index.html">

            <div class="mb-4">
                <label class="form-label">Username</label>
                <input type="text" class="form-control custom-input" placeholder="Enter Username" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control custom-input" placeholder="Enter Password" required>
            </div>

           <a href = "index.html"> <button type="submit" class="login-btn w-100">
                SIGN IN
            </button></a>

        </form>

    </div>
</div>

</body>
</html>
