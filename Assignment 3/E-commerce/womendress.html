<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Women Dresses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="women.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="index.html">FASHION HUB</a>
            <div>
                <a href="cart.html" class="nav-btn">CART</a>
                <a href="login.html" class="nav-btn">LOGIN</a>
            </div>
        </div>
    </nav>

    <!-- Page Title -->
    <div class="container text-center mt-5">
        <h2 class="page-title">WOMEN DRESSES</h2>
    </div>

    <!-- Products -->
    <div class="container mt-4">
        <div class="row g-5">

            <!-- Product 1 -->
            <div class="col-md-4">
                <div class="card text-center">
                    <img src="wdress/1.jpg" class="card-img-top" alt="Casual">
                    <div class="card-body">
                        <h5 class="card-title">Casual</h5>
                        <p class="price">Rs. 1000</p>

                        <select class="form-select size-select mb-3">
                            <option value="">Select Size</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                        </select>

                        <button class="lux-btn"
                            onclick="addToCart(this,'Womens-Dress : Casual',1000)">
                            ADD TO CART
                        </button>
                    </div>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="col-md-4">
                <div class="card text-center">
                    <img src="wdress/2.jpg" class="card-img-top" alt="Party">
                    <div class="card-body">
                        <h5 class="card-title">Party</h5>
                        <p class="price">Rs. 2900</p>

                        <select class="form-select size-select mb-3">
                            <option value="">Select Size</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                        </select>

                        <button class="lux-btn"
                            onclick="addToCart(this,'Womens-Dress : Party',2900)">
                            ADD TO CART
                        </button>
                    </div>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="col-md-4">
                <div class="card text-center">
                    <img src="wdress/3.webp" class="card-img-top" alt="Formal">
                    <div class="card-body">
                        <h5 class="card-title">Formal</h5>
                        <p class="price">Rs. 3500</p>

                        <select class="form-select size-select mb-3">
                            <option value="">Select Size</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                        </select>

                        <button class="lux-btn"
                            onclick="addToCart(this,'Womens-Dress : Formal',3500)">
                            ADD TO CART
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function addToCart(button, productName, productPrice) {

            let cardBody = button.parentElement;
            let sizeSelect = cardBody.querySelector(".size-select");
            let selectedSize = sizeSelect.value;

            if (selectedSize === "") {
                alert("Please select a size before adding to cart.");
                return;
            }

            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            cart.push({
                name: productName,
                price: productPrice,
                size: selectedSize,
                quantity: 1
            });

            localStorage.setItem('cart', JSON.stringify(cart));

            alert(productName + " (Size: " + selectedSize + ") added to cart.");
        }
    </script>

</body>
</html>
