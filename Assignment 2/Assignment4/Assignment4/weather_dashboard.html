<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3 Weather Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            padding: 20px; 
        }
        h2{
            margin-bottom: 10px;
        }
        .line{
            fill: none;
            stroke-width: 3;
        }
        .temp{ stroke:red; }
        .humidity{ stroke:blue; }
        .rain{ stroke:green; }
 
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom:20px; 
        }
    </style>
</head>

<body>

<h1>☁️ Weather Monitoring Dashboard ☁️</h1>

<div class="card">
    <h2>Weekly Weather Report</h2>
    <svg width="900" height="400"></svg>
</div>

<script>
    const data = [ 
      { day: 'Monday', temp: 32, humidity: 60, rain: 10 },
      { day: 'Tuesday', temp: 34, humidity: 55, rain: 5 },
      { day: 'Wednesday', temp: 30, humidity: 65, rain: 20 },
      { day: 'Thursday', temp: 29, humidity: 70, rain: 35 },
      { day: 'Friday', temp: 28, humidity: 45, rain: 0 },
      { day: 'Saturday', temp: 30, humidity: 40, rain: 0 },
      { day: 'Sunday', temp: 25, humidity: 55, rain: 2 }
    ];

    const svg = d3.select("svg"),
          margin = {top:30 , right:100 , bottom:50 , left:60},
          width = +svg.attr("width") - margin.left - margin.right,
          height = +svg.attr("height") - margin.top - margin.bottom;

    const g = svg.append("g")
        .attr("transform" , `translate(${margin.left},${margin.top})`);

    const x = d3.scalePoint()
        .domain(data.map(d => d.day))
        .range([0,width]);

    const y = d3.scaleLinear()
        .domain([0,100])
        .range([height,0]);

    // X Axis
    g.append("g")
        .attr("transform", `translate(0,${height})`)
        .call(d3.axisBottom(x));

    // Y Axis
    g.append("g")
        .call(d3.axisLeft(y));

    const tempLine = d3.line()
        .x(d => x(d.day))
        .y(d => y(d.temp));

    const humidityLine = d3.line()
        .x(d => x(d.day))
        .y(d => y(d.humidity));

    const rainLine = d3.line()
        .x(d => x(d.day))
        .y(d => y(d.rain));

    g.append("path")
        .datum(data)
        .attr("class" , "line temp")
        .attr("d",tempLine);

    g.append("path")
        .datum(data)
        .attr("class" , "line humidity")
        .attr("d",humidityLine);

    g.append("path")
        .datum(data)
        .attr("class" , "line rain")
        .attr("d",rainLine);

    // Legend
    const legend = g.append("g")
        .attr("transform","translate(700,20)");

    legend.append("rect")
        .attr("width",12)
        .attr("height",12)
        .attr("fill","red");

    legend.append("text")
        .attr("x",20)
        .attr("y",10)
        .text("Temperature (°C)");
   
    legend.append("rect")
        .attr("y",25)
        .attr("width",12)
        .attr("height",12)
        .attr("fill","blue");

    legend.append("text")
        .attr("x",20)
        .attr("y",35)
        .text("Humidity (%)");

    legend.append("rect")
        .attr("y",50)
        .attr("width",12)
        .attr("height",12)
        .attr("fill","green");

    legend.append("text")
        .attr("x",20)
        .attr("y",60)
        .text("Rainfall (mm)");

</script>

</body>
</html>
